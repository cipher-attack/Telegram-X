name: Android CI
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf /usr/lib/jvm/zulu*
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        lfs: true
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        cache-read-only: false
        validate-wrappers: true
    - name: Compute cache hash
      id: cachekey
      run: |
        echo "hash=${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties', 'submodules/td/**/CMakeLists.txt', 'app/src/**/CMakeLists.txt', 'scripts/setup.sh') }}" >> "$GITHUB_OUTPUT"
    - name: Install Build Tools
      run: |
        sudo apt-get update -y
        sudo apt-get install -y ccache ninja-build
        echo "/usr/lib/ccache" >> "$GITHUB_PATH"
        ccache --max-size=2G
        ccache --set-config=compression=true
        ccache --set-config=sloppiness=file_macro,time_macros,include_file_mtime,include_file_ctime
    - name: Resolve SDK path
      id: sdkpath
      run: echo "path=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> "$GITHUB_OUTPUT"
    - name: Cache Android SDK and NDK
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.sdkpath.outputs.path }}
          ~/.android/cache
        key: ${{ runner.os }}-sdk-${{ hashFiles('scripts/setup.sh', 'scripts/setup-sdk.sh') }}
        restore-keys: |
          ${{ runner.os }}-sdk-
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ steps.cachekey.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-ccache-
    - name: Cache Gradle dependency modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches/modules-2
          ~/.gradle/caches/jars-9
          ~/.gradle/caches/transforms-3
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-modules-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-modules-
    - name: Cache Build Folders
      uses: actions/cache@v4
      with:
        path: |
          app/build
          app/.cxx
          .gradle/configuration-cache
          .gradle/buildOutputCleanup
        key: ${{ runner.os }}-build-${{ steps.cachekey.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-build-
    - name: Set up local.properties
      run: |
        cp local.properties.sample local.properties || true
        echo "" >> local.properties
        {
          echo "telegram.api_id=${{ secrets.TELEGRAM_API_ID }}"
          echo "telegram.api_hash=${{ secrets.TELEGRAM_API_HASH }}"
        } >> local.properties
    - name: Set up signing keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.jks"
        cat > "${{ github.workspace }}/keystore.properties" << EOF
        keystore.file=${{ github.workspace }}/release.jks
        keystore.password=$KEYSTORE_PASSWORD
        key.alias=$KEY_ALIAS
        key.password=$KEY_PASSWORD
        EOF
        echo "keystore.file=${{ github.workspace }}/keystore.properties" >> local.properties
    - name: Run setup script
      env:
        TERM: xterm
      run: |
        export ANDROID_SDK_ROOT="${{ steps.sdkpath.outputs.path }}"
        export USE_CCACHE=1
        export CCACHE_DIR="$HOME/.ccache"
        yes | bash scripts/setup.sh
    - name: Clean Old APKs
      run: find app/build/ -type f -name "*.apk" -delete 2>/dev/null || true
    - name: Build with Gradle
      env:
        USE_CCACHE: 1
        CCACHE_DIR: /home/runner/.ccache
      run: |
        chmod +x gradlew
        ./gradlew assembleLegacyArm32Release \
          -Pandroid.externalNativeBuild.cmake.arguments="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -GNinja" \
          --parallel --build-cache --configuration-cache

    - name: Prepare APK Metadata
      id: prepare
      run: |
        RAW_APK=$(find app/build/outputs/apk/ -type f -name "*.apk" | head -n 1)
        if [ -z "$RAW_APK" ] || [ ! -f "$RAW_APK" ]; then
          echo "apk_found=false" >> "$GITHUB_OUTPUT"
          echo "No APK found after build!"
          exit 1
        fi
        SHA_SHORT=$(git rev-parse --short HEAD)
        DATE=$(date +'%Y%m%d')
        APK_NAME="TGX-Arm32-${SHA_SHORT}-${DATE}.apk"
        mkdir -p clean_apk
        cp "$RAW_APK" "clean_apk/$APK_NAME"
        echo "apk_found=true" >> "$GITHUB_OUTPUT"
        echo "apk_path=clean_apk/$APK_NAME" >> "$GITHUB_OUTPUT"
        echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
        echo "commit_msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

    - name: Upload APK to Telegram
      if: steps.prepare.outputs.apk_found == 'true'
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_ID }}
        COMMIT_MSG: ${{ steps.prepare.outputs.commit_msg }}
        BRANCH_NAME: ${{ github.ref_name }}
        APK_FILE: ${{ steps.prepare.outputs.apk_path }}
      run: |
        if [ -f "$APK_FILE" ]; then
          MSG="<b>Build Complete</b>
          <b>Branch:</b> $BRANCH_NAME
          <b>Commit:</b> <code>$COMMIT_MSG</code>"

          curl -F document=@"$APK_FILE" \
               -F chat_id="${TG_ID}" \
               --form-string caption="$MSG" \
               -F parse_mode="HTML" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
        else
          echo "No APK found to upload!"
        fi

    - name: ccache stats
      run: ccache -s
