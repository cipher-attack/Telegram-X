name: Android CI
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        lfs: true
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        cache-read-only: false
        validate-wrappers: true
    - name: Compute cache hash
      id: cachekey
      run: |
        echo "hash=${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties', 'submodules/td/**/CMakeLists.txt', 'app/src/**/CMakeLists.txt', 'scripts/setup.sh') }}" >> "$GITHUB_OUTPUT"
    - name: Install ccache
      run: |
        sudo apt-get update -y
        sudo apt-get install -y ccache
        echo "/usr/lib/ccache" >> "$GITHUB_PATH"
        ccache --max-size=2G
        ccache --set-config=compression=true
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ steps.cachekey.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-ccache-
    - name: Resolve SDK path
      id: sdkpath
      run: echo "path=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> "$GITHUB_OUTPUT"
    - name: Cache Android SDK and NDK
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.sdkpath.outputs.path }}
          ~/.android/cache
        key: ${{ runner.os }}-sdk-${{ hashFiles('scripts/setup.sh', 'scripts/setup-sdk.sh') }}
        restore-keys: |
          ${{ runner.os }}-sdk-
    - name: Cache Gradle dependency modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches/modules-2
          ~/.gradle/caches/jars-9
          ~/.gradle/caches/transforms-3
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-modules-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-modules-
    - name: Cache Build Folders
      uses: actions/cache@v4
      with:
        path: |
          app/build
          app/.cxx
          .gradle/configuration-cache
          .gradle/buildOutputCleanup
        key: ${{ runner.os }}-build-${{ steps.cachekey.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-build-
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Set up local.properties
      run: |
        cp local.properties.sample local.properties || true
        echo "" >> local.properties
        echo "telegram.api_id=${{ secrets.TELEGRAM_API_ID }}" >> local.properties
        echo "telegram.api_hash=${{ secrets.TELEGRAM_API_HASH }}" >> local.properties
    - name: Set up signing keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.jks"
        cat > "${{ github.workspace }}/keystore.properties" << EOF
        keystore.file=${{ github.workspace }}/release.jks
        keystore.password=$KEYSTORE_PASSWORD
        key.alias=$KEY_ALIAS
        key.password=$KEY_PASSWORD
        EOF
        echo "keystore.file=${{ github.workspace }}/keystore.properties" >> local.properties
    - name: Run setup script
      env:
        TERM: xterm
      run: |
        export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
        export USE_CCACHE=1
        export CCACHE_DIR="$HOME/.ccache"
        yes | bash scripts/setup.sh
    - name: Clean Old Cached APKs
      run: |
        find app/build/ -type f -name "*.apk" -delete 2>/dev/null || true
    - name: Build with Gradle (armeabi-v7a only)
      env:
        USE_CCACHE: 1
        CCACHE_DIR: /home/runner/.ccache
      run: ./gradlew assembleLegacyArm32Release -Pandroid.externalNativeBuild.cmake.arguments="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache" --parallel --build-cache --configuration-cache
    - name: ccache stats
      run: ccache -s
    - name: Filter and Clean APK
      run: |
        mkdir -p clean_apk
        find app/build/outputs/apk/ -type f -name "*.apk" -exec cp {} clean_apk/ \;
        ls -l clean_apk
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Telegram-X-armeabi-v7a-Release-APK
        path: clean_apk/*.apk
    - name: Upload APK to Telegram
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_ID }}
      run: |
        APK_FILE=$(find clean_apk/ -name "*.apk" | head -n 1)
        if [ -f "$APK_FILE" ]; then
          curl -F document=@"$APK_FILE" "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument?chat_id=${TG_ID}"
        else
          echo "No APK found to upload!"
        fi
